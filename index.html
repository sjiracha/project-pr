<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Propose Ring</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #camera-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror */
    }

    #three-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #debug {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #0f0;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.6;
      text-shadow: 0 0 4px #000;
      z-index: 10;
      pointer-events: none;
    }

    #error-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #f55;
      font-family: monospace;
      font-size: 18px;
      text-align: center;
      z-index: 20;
      display: none;
    }
  </style>
</head>
<body>

  <video id="camera-video" autoplay playsinline muted></video>
  <canvas id="three-canvas"></canvas>
  <div id="debug">카메라 초기화 중...</div>
  <div id="error-msg"></div>

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- MediaPipe Hands CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script>
    const video = document.getElementById('camera-video');
    const canvas = document.getElementById('three-canvas');
    const debug = document.getElementById('debug');
    const errorMsg = document.getElementById('error-msg');

    // ── Three.js setup ──────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0); // transparent

    const scene = new THREE.Scene();
    const camera3d = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera3d.position.z = 5;

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera3d.aspect = window.innerWidth / window.innerHeight;
      camera3d.updateProjectionMatrix();
    });

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera3d);
    }
    animate();

    // ── Camera stream ───────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();

        const track = stream.getVideoTracks()[0];
        const settings = track.getSettings();
        debug.textContent = [
          '카메라: ON',
          `해상도: ${settings.width} x ${settings.height}`,
          '손 감지: 대기 중',
        ].join('\n');
      } catch (err) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = `카메라 오류: ${err.message}\n카메라 권한을 허용해주세요.`;
        debug.textContent = '카메라: 오류';
        console.error(err);
      }
    }

    startCamera();
  </script>
</body>
</html>
