<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Propose Ring</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

    #camera-video {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1);
    }

    #landmark-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; transform: scaleX(-1);
    }

    #three-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #debug {
      position: absolute; top: 16px; left: 16px;
      font-family: monospace; font-size: 14px; line-height: 1.8;
      text-shadow: 0 0 6px #000, 0 0 6px #000;
      z-index: 10; pointer-events: none; white-space: pre;
    }

    #error-msg {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #f55; font-family: monospace; font-size: 18px;
      text-align: center; z-index: 20; display: none;
    }

    #hint {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.45); font-family: monospace; font-size: 13px;
      z-index: 10; pointer-events: none; letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <video id="camera-video" autoplay playsinline muted></video>
  <canvas id="landmark-canvas"></canvas>
  <canvas id="three-canvas"></canvas>
  <div id="debug">카메라 초기화 중...</div>
  <div id="error-msg"></div>
  <div id="hint">[SPACE] 뚜껑 열기 테스트</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script>
    // ── DOM refs ────────────────────────────────────────────────
    const video          = document.getElementById('camera-video');
    const landmarkCanvas = document.getElementById('landmark-canvas');
    const threeCanvas    = document.getElementById('three-canvas');
    const debugEl        = document.getElementById('debug');
    const errorMsg       = document.getElementById('error-msg');
    const lCtx           = landmarkCanvas.getContext('2d');

    const HAND_CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [5,9],[9,10],[10,11],[11,12],
      [9,13],[13,14],[14,15],[15,16],
      [13,17],[17,18],[18,19],[19,20],
      [0,17],
    ];

    // ── Three.js core ───────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);

    const scene    = new THREE.Scene();
    const camera3d = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera3d.position.set(0, 0, 5);

    function resizeAll() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      camera3d.aspect = w / h;
      camera3d.updateProjectionMatrix();
      landmarkCanvas.width  = w;
      landmarkCanvas.height = h;
    }
    window.addEventListener('resize', resizeAll);

    // ── Lighting ────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const dirFront = new THREE.DirectionalLight(0xfff5e0, 0.9);
    dirFront.position.set(1.5, 4, 3);
    scene.add(dirFront);

    const dirSide = new THREE.DirectionalLight(0xd0e0ff, 0.35);
    dirSide.position.set(-4, 2, 1);
    scene.add(dirSide);

    // PointLight above the case — for ring sparkle later
    const pointTop = new THREE.PointLight(0xfff8e7, 1.5, 12);
    pointTop.position.set(0, 6, 1);
    scene.add(pointTop);

    // ── Ring Case geometry ──────────────────────────────────────
    const BASE_W = 3, BASE_H = 1.5, BASE_D = 3, LID_H = 0.3;
    const MAX_OPEN = -(110 * Math.PI / 180); // lid fully open angle

    const caseMat  = new THREE.MeshStandardMaterial({ color: 0x0D1B2A, roughness: 0.8, metalness: 0.05 });
    const goldMat  = new THREE.LineBasicMaterial({ color: 0xD4AF37 });
    const creamMat = new THREE.MeshStandardMaterial({ color: 0xF5F0E8, roughness: 0.95 });
    const slotMat  = new THREE.MeshStandardMaterial({ color: 0xE0D8C8, roughness: 0.98 });

    // Root group — slight X-tilt to show the top face toward camera
    const caseGroup = new THREE.Group();
    caseGroup.rotation.x = -0.25;
    caseGroup.position.y = -0.4;
    scene.add(caseGroup);

    // ─ Base ─
    const baseGeo  = new THREE.BoxGeometry(BASE_W, BASE_H, BASE_D);
    const baseMesh = new THREE.Mesh(baseGeo, caseMat);
    caseGroup.add(baseMesh);
    baseMesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(baseGeo), goldMat));

    // Interior cushion (cream pad sitting just inside the top of the base)
    const cushGeo  = new THREE.BoxGeometry(BASE_W - 0.15, 0.1, BASE_D - 0.15);
    const cushMesh = new THREE.Mesh(cushGeo, creamMat);
    cushMesh.position.y = BASE_H / 2 - 0.05;
    baseMesh.add(cushMesh);

    // Ring slot groove on the cushion
    const slotGeo  = new THREE.BoxGeometry(0.22, 0.14, BASE_D - 0.3);
    const slotMesh = new THREE.Mesh(slotGeo, slotMat);
    slotMesh.position.set(0, 0.12, 0);
    cushMesh.add(slotMesh);

    // ─ Lid pivot ─
    // Hinge sits at the back-top edge of the base in caseGroup space
    const lidPivot = new THREE.Group();
    lidPivot.position.set(0, BASE_H / 2, -BASE_D / 2);
    caseGroup.add(lidPivot);

    // Lid mesh: in pivot space its back edge (z = -BASE_D/2) aligns with z = 0 (hinge)
    const lidGeo  = new THREE.BoxGeometry(BASE_W, LID_H, BASE_D);
    const lidMesh = new THREE.Mesh(lidGeo, caseMat);
    lidMesh.position.set(0, LID_H / 2, BASE_D / 2);
    lidPivot.add(lidMesh);
    lidMesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(lidGeo), goldMat));

    // Cream lining on the inside face of the lid
    const lidIntGeo  = new THREE.BoxGeometry(BASE_W - 0.1, 0.025, BASE_D - 0.1);
    const lidIntMesh = new THREE.Mesh(lidIntGeo, creamMat);
    lidIntMesh.position.set(0, -(LID_H / 2) + 0.013, 0);
    lidMesh.add(lidIntMesh);

    // ── Case animation state ────────────────────────────────────
    // px/py: world-space target for caseGroup position
    const caseAnim = { lidTarget: 0, zRot: 0, px: 0, py: -0.4 };

    // ── Coordinate helper ───────────────────────────────────────
    // Converts landmark-canvas pixel coords (unmirrored space) → Three.js world XY
    function screenToWorld(px, py) {
      const w = window.innerWidth, h = window.innerHeight;
      const ndcX = ((w - px) / w) * 2 - 1; // flip X for mirror
      const ndcY = -((py / h) * 2 - 1);
      const halfH = Math.tan((60 * Math.PI / 180) / 2) * 5; // camera z = 5
      return { x: ndcX * halfH * (w / h), y: ndcY * halfH };
    }

    // ── Public API for gesture system ───────────────────────────
    function updateCaseOpen(openPercent, tiltAngle, cx, cy) {
      if (!spaceOpen) {
        caseAnim.lidTarget = openPercent * MAX_OPEN;
      }
      caseAnim.zRot = -tiltAngle * (Math.PI / 180);
      if (cx != null) {
        const wp    = screenToWorld(cx, cy);
        caseAnim.px = wp.x;
        caseAnim.py = wp.y;
      }
    }

    // ── Spacebar test ───────────────────────────────────────────
    let spaceOpen = false;
    document.addEventListener('keydown', e => {
      if (e.code !== 'Space') return;
      e.preventDefault();
      spaceOpen = !spaceOpen;
      caseAnim.lidTarget = spaceOpen ? MAX_OPEN : 0;
    });

    // ── Animate loop ────────────────────────────────────────────
    (function animate() {
      requestAnimationFrame(animate);
      const L = 0.1;
      lidPivot.rotation.x  += (caseAnim.lidTarget - lidPivot.rotation.x)  * L;
      caseGroup.rotation.z += (caseAnim.zRot      - caseGroup.rotation.z) * L;
      caseGroup.position.x += (caseAnim.px        - caseGroup.position.x) * L;
      caseGroup.position.y += (caseAnim.py        - caseGroup.position.y) * L;
      renderer.render(scene, camera3d);
    })();

    // ── Gesture state ───────────────────────────────────────────
    const CLOSE_DIST = 150, OPEN_DIST = 500, SMOOTH_LEN = 5, DECAY_RATE = 0.08;
    const smoothBuf  = [];
    let gesture = { openPercent: 0, tiltAngle: 0, centerX: 0, centerY: 0, bothHands: false };

    function calcGesture(multiHandLandmarks) {
      const w = landmarkCanvas.width, h = landmarkCanvas.height;

      if (!multiHandLandmarks || multiHandLandmarks.length < 2) {
        gesture.bothHands   = false;
        gesture.openPercent = Math.max(0, gesture.openPercent - DECAY_RATE);
        return;
      }

      gesture.bothHands = true;
      const p0 = multiHandLandmarks[0][0], p1 = multiHandLandmarks[1][0];
      const x0 = p0.x * w, y0 = p0.y * h;
      const x1 = p1.x * w, y1 = p1.y * h;
      const dx = x1 - x0, dy = y1 - y0;
      const dist = Math.sqrt(dx * dx + dy * dy);

      const raw = Math.min(1, Math.max(0, (dist - CLOSE_DIST) / (OPEN_DIST - CLOSE_DIST)));
      smoothBuf.push(raw);
      if (smoothBuf.length > SMOOTH_LEN) smoothBuf.shift();
      gesture.openPercent = smoothBuf.reduce((s, v) => s + v, 0) / smoothBuf.length;
      gesture.tiltAngle   = Math.atan2(dy, dx) * (180 / Math.PI);
      gesture.centerX     = (x0 + x1) / 2;
      gesture.centerY     = (y0 + y1) / 2;
    }

    // ── Landmark & gesture drawing ──────────────────────────────
    function drawGestureOverlay(multiHandLandmarks) {
      const w = landmarkCanvas.width, h = landmarkCanvas.height;
      if (!multiHandLandmarks || multiHandLandmarks.length < 2) return;

      const p0 = multiHandLandmarks[0][0], p1 = multiHandLandmarks[1][0];
      const x0 = p0.x * w, y0 = p0.y * h;
      const x1 = p1.x * w, y1 = p1.y * h;

      lCtx.save();
      lCtx.globalAlpha = 0.4 + gesture.openPercent * 0.6;
      lCtx.strokeStyle = '#ffee00';
      lCtx.lineWidth   = 2;
      lCtx.setLineDash([8, 6]);
      lCtx.beginPath();
      lCtx.moveTo(x0, y0);
      lCtx.lineTo(x1, y1);
      lCtx.stroke();
      lCtx.setLineDash([]);

      lCtx.globalAlpha = 1;
      lCtx.beginPath();
      lCtx.arc(gesture.centerX, gesture.centerY, 6, 0, Math.PI * 2);
      lCtx.fillStyle = '#ffee00';
      lCtx.fill();
      lCtx.restore();
    }

    function drawLandmarks(multiHandLandmarks, multiHandedness) {
      const w = landmarkCanvas.width, h = landmarkCanvas.height;
      lCtx.clearRect(0, 0, w, h);
      if (!multiHandLandmarks) return;

      multiHandLandmarks.forEach((landmarks, i) => {
        const label = multiHandedness[i]?.label ?? '';
        const color = label === 'Left' ? '#00e5ff' : '#ff4081';

        lCtx.strokeStyle = color;
        lCtx.lineWidth   = 2;
        lCtx.globalAlpha = 0.75;
        HAND_CONNECTIONS.forEach(([a, b]) => {
          lCtx.beginPath();
          lCtx.moveTo(landmarks[a].x * w, landmarks[a].y * h);
          lCtx.lineTo(landmarks[b].x * w, landmarks[b].y * h);
          lCtx.stroke();
        });

        lCtx.globalAlpha = 1;
        landmarks.forEach((pt, idx) => {
          const isKey = [4, 8, 12, 16, 20, 0].includes(idx);
          lCtx.beginPath();
          lCtx.arc(pt.x * w, pt.y * h, isKey ? 6 : 3, 0, Math.PI * 2);
          lCtx.fillStyle = isKey ? '#fff' : color;
          lCtx.fill();
        });
      });

      drawGestureOverlay(multiHandLandmarks);
    }

    // ── Debug panel ─────────────────────────────────────────────
    function updateDebug(multiHandLandmarks, multiHandedness) {
      const count    = multiHandLandmarks?.length ?? 0;
      const detected = count > 0;
      debugEl.style.color = detected ? '#00ff88' : '#ff4444';

      const labels = detected
        ? multiHandedness.map(h => h.label === 'Left' ? '왼손' : '오른손').join(', ')
        : '-';

      const state = gesture.openPercent >= 0.99 ? '🟡 완전 열림'
                  : gesture.openPercent > 0.01  ? '🟠 열리는 중'
                  :                               '⚪ 닫힘';

      debugEl.textContent = [
        `손 감지: ${detected ? '✅' : '❌'} ${count}개`,
        `종류: ${labels}`,
        `openPercent: ${gesture.openPercent.toFixed(2)}${spaceOpen ? '  [SPACE]' : ''}`,
        `tiltAngle: ${gesture.openPercent > 0 ? gesture.tiltAngle.toFixed(1) + '°' : '-'}`,
        `상태: ${state}`,
      ].join('\n');
    }

    // ── MediaPipe Hands ─────────────────────────────────────────
    function initHands() {
      const hands = new Hands({
        locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });
      hands.setOptions({
        maxNumHands:             2,
        modelComplexity:         1,
        minDetectionConfidence:  0.7,
        minTrackingConfidence:   0.6,
      });
      hands.onResults(results => {
        calcGesture(results.multiHandLandmarks);
        drawLandmarks(results.multiHandLandmarks, results.multiHandedness);
        updateDebug(results.multiHandLandmarks, results.multiHandedness);
        updateCaseOpen(
          gesture.openPercent,
          gesture.tiltAngle,
          gesture.bothHands ? gesture.centerX : null,
          gesture.bothHands ? gesture.centerY : null,
        );
      });

      new Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 1280, height: 720,
      }).start();
    }

    // ── Camera stream ───────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();
        resizeAll();

        const settings = stream.getVideoTracks()[0].getSettings();
        debugEl.style.color = '#aaa';
        debugEl.textContent = `카메라: ON  (${settings.width}×${settings.height})\n손 감지: 초기화 중...`;
        initHands();
      } catch (err) {
        errorMsg.style.display = 'block';
        errorMsg.textContent   = `카메라 오류: ${err.message}\n카메라 권한을 허용해주세요.`;
        debugEl.textContent    = '카메라: 오류';
        console.error(err);
      }
    }

    startCamera();
  </script>
</body>
</html>
