<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Propose Ring</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

    #camera-video {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1);
    }

    #landmark-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; transform: scaleX(-1);
    }

    #three-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #debug {
      position: absolute; top: 16px; left: 16px;
      font-family: monospace; font-size: 14px; line-height: 1.8;
      text-shadow: 0 0 6px #000, 0 0 6px #000;
      z-index: 10; pointer-events: none; white-space: pre;
    }

    #error-msg {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #f55; font-family: monospace; font-size: 18px;
      text-align: center; z-index: 20; display: none;
    }

    #hint {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4); font-family: monospace; font-size: 13px;
      z-index: 10; pointer-events: none; letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <video id="camera-video" autoplay playsinline muted></video>
  <canvas id="landmark-canvas"></canvas>
  <canvas id="three-canvas"></canvas>
  <div id="debug">카메라 초기화 중...</div>
  <div id="error-msg"></div>
  <div id="hint">[SPACE] 뚜껑 열기 테스트</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script>
    // ── DOM refs ─────────────────────────────────────────────────
    const video          = document.getElementById('camera-video');
    const landmarkCanvas = document.getElementById('landmark-canvas');
    const threeCanvas    = document.getElementById('three-canvas');
    const debugEl        = document.getElementById('debug');
    const errorMsg       = document.getElementById('error-msg');
    const lCtx           = landmarkCanvas.getContext('2d');

    const HAND_CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [5,9],[9,10],[10,11],[11,12],
      [9,13],[13,14],[14,15],[15,16],
      [13,17],[17,18],[18,19],[19,20],
      [0,17],
    ];

    // ── Three.js core ────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true, logarithmicDepthBuffer: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    renderer.shadowMap.enabled = true;

    const scene    = new THREE.Scene();
    const camera3d = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera3d.position.set(0, 0, 5);

    function resizeAll() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      camera3d.aspect = w / h;
      camera3d.updateProjectionMatrix();
      landmarkCanvas.width  = w;
      landmarkCanvas.height = h;
    }
    window.addEventListener('resize', resizeAll);

    // ── Lighting ─────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.35));

    const dirFront = new THREE.DirectionalLight(0xfff0d0, 1.0);
    dirFront.position.set(2, 5, 4);
    scene.add(dirFront);

    const dirSide = new THREE.DirectionalLight(0xc8d8ff, 0.4);
    dirSide.position.set(-4, 2, 1);
    scene.add(dirSide);

    // PointLight above — ring sparkle when lid opens
    const pointTop = new THREE.PointLight(0xfff5e0, 2.0, 10);
    pointTop.position.set(0, 5, 1);
    scene.add(pointTop);

    // ── Rounded box geometry helper ──────────────────────────────
    // Creates a w×h×d box with arc-rounded edges and corners.
    // Uses ExtrudeGeometry: rounded-rect shape in XZ → extrude along Y.
    function roundedBoxGeo(w, h, d, r, segs) {
      segs = segs || 4;
      r = Math.min(r, w * 0.44, h * 0.44, d * 0.44);

      // Rounded rectangle shape in XZ plane (footprint of the box)
      const shape = new THREE.Shape();
      shape.moveTo(-w / 2 + r, -d / 2);
      shape.lineTo( w / 2 - r, -d / 2);
      shape.absarc( w / 2 - r, -d / 2 + r, r, -Math.PI / 2,        0, false);
      shape.lineTo( w / 2,      d / 2 - r);
      shape.absarc( w / 2 - r,  d / 2 - r, r,         0,  Math.PI / 2, false);
      shape.lineTo(-w / 2 + r,  d / 2);
      shape.absarc(-w / 2 + r,  d / 2 - r, r,  Math.PI / 2,     Math.PI, false);
      shape.lineTo(-w / 2,     -d / 2 + r);
      shape.absarc(-w / 2 + r, -d / 2 + r, r,     Math.PI, 3 * Math.PI / 2, false);

      const extrudeDepth = Math.max(0.001, h - 2 * r);
      const geo = new THREE.ExtrudeGeometry(shape, {
        steps:          1,
        depth:          extrudeDepth,
        bevelEnabled:   true,
        bevelThickness: r,
        bevelSize:      r,
        bevelOffset:    -r,
        bevelSegments:  segs,
        curveSegments:  segs * 3,
      });

      geo.center();
      // The shape lives in XY and extrudes along Z.
      // Rotate -90° around X so the flat footprint lies in XZ (Y becomes vertical).
      geo.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
      return geo;
    }

    // ── Gold edge outline helper ─────────────────────────────────
    // Adds crisp rectangular gold edge lines that frame the rounded body.
    function addGoldEdges(mesh, w, h, d, mat) {
      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, d)),
        mat
      );
      mesh.add(edges);
    }

    // ── Materials ────────────────────────────────────────────────
    // Deep velvet navy — high roughness, zero metalness for matte fabric feel
    const caseMat  = new THREE.MeshStandardMaterial({ color: 0x0B1622, roughness: 0.88, metalness: 0.0 });
    const goldLine = new THREE.LineBasicMaterial({ color: 0xD4AF37 });
    const creamMat = new THREE.MeshStandardMaterial({ color: 0xF0E8DC, roughness: 0.94 });
    const slotMat  = new THREE.MeshStandardMaterial({ color: 0xE0D5C5, roughness: 0.97 });
    const ringMat  = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.92, roughness: 0.12 });

    // ── Dimensions (50% of original) ─────────────────────────────
    const BW = 1.5, BH = 0.75, BD = 1.5; // base width / height / depth
    const LH = 0.15;                       // lid height
    const BR = 0.08;                       // base bevel radius
    const LR = 0.04;                       // lid bevel radius
    const MAX_OPEN = -(110 * Math.PI / 180);

    // ── Case group ───────────────────────────────────────────────
    const caseGroup = new THREE.Group();
    caseGroup.rotation.x = -0.25;  // tilt toward camera to show interior
    caseGroup.position.y = -0.4;
    scene.add(caseGroup);

    // ─ Base ─
    const baseMesh = new THREE.Mesh(roundedBoxGeo(BW, BH, BD, BR, 5), caseMat);
    caseGroup.add(baseMesh);
    addGoldEdges(baseMesh, BW, BH, BD, goldLine);

    // Cream cushion inside base (near top, visible when lid opens)
    const cushMesh = new THREE.Mesh(
      new THREE.BoxGeometry(BW - 0.12, 0.06, BD - 0.12),
      creamMat
    );
    cushMesh.position.y = BH / 2 - 0.1; // sink 0.07 deeper to clear z-fighting with base top face
    baseMesh.add(cushMesh);

    // Ring slot groove on the cushion
    const slotMesh = new THREE.Mesh(
      new THREE.BoxGeometry(0.11, 0.07, BD - 0.18),
      slotMat
    );
    slotMesh.position.y = 0.065;
    cushMesh.add(slotMesh);

    // ─ Lid pivot group — hinge at back-top edge of base ─
    const lidPivot = new THREE.Group();
    lidPivot.position.set(0, BH / 2, -BD / 2);
    caseGroup.add(lidPivot);

    const lidMesh = new THREE.Mesh(roundedBoxGeo(BW, LH, BD, LR, 4), caseMat);
    lidMesh.position.set(0, LH / 2, BD / 2);
    lidPivot.add(lidMesh);
    addGoldEdges(lidMesh, BW, LH, BD, goldLine);

    // Cream lining on the inside face of the lid
    const lidIntMesh = new THREE.Mesh(
      new THREE.BoxGeometry(BW - 0.08, 0.018, BD - 0.08),
      creamMat
    );
    lidIntMesh.position.set(0, -(LH / 2) + 0.009, 0);
    lidMesh.add(lidIntMesh);

    // ─ Ring ─
    // Torus: radius 0.18, tube 0.038 — stands upright in the slot
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.18, 0.038, 14, 64),
      ringMat
    );
    ring.rotation.x = 0; // default torus lies in XY plane → faces camera (O shape); PI/2 would make it horizontal (---)
    ring.visible    = false;
    caseGroup.add(ring);

    // Y positions for ring in caseGroup space
    const RING_Y_HIDDEN = 0.05;  // inside base, occluded by walls
    const RING_Y_SHOWN  = 0.68;  // above the open case

    // ── Animation state ──────────────────────────────────────────
    const caseAnim = { lidTarget: 0, zRot: 0, px: 0, py: -0.4 };

    function screenToWorld(px, py) {
      const w = window.innerWidth, h = window.innerHeight;
      const ndcX = ((w - px) / w) * 2 - 1; // flip X to match mirror
      const ndcY = -((py / h) * 2 - 1);
      const halfH = Math.tan((60 * Math.PI / 180) / 2) * 5;
      const halfW = halfH * (w / h);
      const MARGIN = 1.2; // world units from edge — case never exits screen
      return {
        x: Math.max(-(halfW - MARGIN), Math.min(halfW - MARGIN, ndcX * halfW)),
        y: Math.max(-(halfH - MARGIN), Math.min(halfH - MARGIN, ndcY * halfH)),
      };
    }

    function updateCaseOpen(openPercent, tiltAngle, cx, cy) {
      if (!spaceOpen) {
        caseAnim.lidTarget = openPercent * MAX_OPEN;
      }
      const clampedTilt = Math.max(-30, Math.min(30, tiltAngle));
      caseAnim.zRot = -clampedTilt * (Math.PI / 180);
      if (cx != null) {
        const wp    = screenToWorld(cx, cy);
        caseAnim.px = wp.x;
        caseAnim.py = wp.y;
      }
    }

    // ── Spacebar test ────────────────────────────────────────────
    let spaceOpen = false;
    document.addEventListener('keydown', e => {
      if (e.code !== 'Space') return;
      e.preventDefault();
      spaceOpen = !spaceOpen;
      caseAnim.lidTarget = spaceOpen ? MAX_OPEN : 0;
    });

    // ── Animate loop ─────────────────────────────────────────────
    (function animate() {
      requestAnimationFrame(animate);
      lidPivot.rotation.x  += (caseAnim.lidTarget - lidPivot.rotation.x)  * 0.10;
      caseGroup.rotation.z += (caseAnim.zRot      - caseGroup.rotation.z) * 0.08;
      caseGroup.position.x += (caseAnim.px        - caseGroup.position.x) * 0.03;
      caseGroup.position.y += (caseAnim.py        - caseGroup.position.y) * 0.03;

      // Ring: rise out of case once lid is 30% open
      const currentOpen = Math.abs(lidPivot.rotation.x) / Math.abs(MAX_OPEN);
      const rawFactor   = Math.max(0, (currentOpen - 0.3) / 0.7);
      const eased       = rawFactor * rawFactor * (3 - 2 * rawFactor); // smoothstep

      ring.visible    = currentOpen > 0.2;
      ring.position.y = RING_Y_HIDDEN + eased * (RING_Y_SHOWN - RING_Y_HIDDEN);
      ring.rotation.z = eased * 0.15; // slight lean as it rises

      renderer.render(scene, camera3d);
    })();

    // ── Gesture state ────────────────────────────────────────────
    const CLOSE_DIST   = 150, OPEN_DIST = 500, SMOOTH_LEN = 5, DECAY_RATE = 0.08;
    const OPEN_RATE    = 0.05;  // max openPercent change per frame
    const JUMP_THRESH  = 0.05;  // normalized wrist jump (5% of screen) that triggers frame rejection
    const TILT_RATE    = 1.0;   // max tiltAngle change in degrees per frame
    const CENTER_LEN   = 10;    // frames for center-position moving average
    const smoothBuf    = [];
    const centerXBuf   = [];
    const centerYBuf   = [];
    let prevWrists     = null;  // [{x,y}, {x,y}] in normalized coords from last valid frame
    let gesture = { openPercent: 0, tiltAngle: 0, centerX: 0, centerY: 0, bothHands: false };

    function wristDist(a, b) {
      const dx = a.x - b.x, dy = a.y - b.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function calcGesture(multiHandLandmarks) {
      const w = landmarkCanvas.width, h = landmarkCanvas.height;

      if (!multiHandLandmarks || multiHandLandmarks.length < 2) {
        gesture.bothHands   = false;
        gesture.openPercent = Math.max(0, gesture.openPercent - DECAY_RATE);
        prevWrists = null;
        centerXBuf.length   = 0;
        centerYBuf.length   = 0;
        return;
      }

      // Stability check: reject frame if wrists jumped too far from last frame.
      // Try both pairings (hands can swap index between frames).
      const p0 = multiHandLandmarks[0][0], p1 = multiHandLandmarks[1][0];
      const curr = [{ x: p0.x, y: p0.y }, { x: p1.x, y: p1.y }];
      if (prevWrists) {
        const jumpA = Math.max(wristDist(curr[0], prevWrists[0]), wristDist(curr[1], prevWrists[1]));
        const jumpB = Math.max(wristDist(curr[0], prevWrists[1]), wristDist(curr[1], prevWrists[0]));
        if (Math.min(jumpA, jumpB) > JUMP_THRESH) {
          prevWrists = null; // reset anchor — next valid frame becomes the new baseline
          return;
        }
      }
      prevWrists = curr;

      gesture.bothHands = true;
      const x0 = p0.x * w, y0 = p0.y * h;
      const x1 = p1.x * w, y1 = p1.y * h;
      const dx = x1 - x0, dy = y1 - y0;
      const dist = Math.sqrt(dx * dx + dy * dy);

      const raw = Math.min(1, Math.max(0, (dist - CLOSE_DIST) / (OPEN_DIST - CLOSE_DIST)));
      smoothBuf.push(raw);
      if (smoothBuf.length > SMOOTH_LEN) smoothBuf.shift();
      const smoothed = smoothBuf.reduce((s, v) => s + v, 0) / smoothBuf.length;

      // Rate-limit: openPercent changes at most OPEN_RATE per frame
      const delta = Math.max(-OPEN_RATE, Math.min(OPEN_RATE, smoothed - gesture.openPercent));
      gesture.openPercent += delta;

      // tiltAngle: rate-limited to TILT_RATE °/frame
      const rawTilt  = Math.atan2(dy, dx) * (180 / Math.PI);
      const tiltDelta = Math.max(-TILT_RATE, Math.min(TILT_RATE, rawTilt - gesture.tiltAngle));
      gesture.tiltAngle += tiltDelta;

      // centerX/Y: 10-frame moving average for smooth position tracking
      const rawCX = (x0 + x1) / 2, rawCY = (y0 + y1) / 2;
      centerXBuf.push(rawCX); if (centerXBuf.length > CENTER_LEN) centerXBuf.shift();
      centerYBuf.push(rawCY); if (centerYBuf.length > CENTER_LEN) centerYBuf.shift();
      gesture.centerX = centerXBuf.reduce((s, v) => s + v, 0) / centerXBuf.length;
      gesture.centerY = centerYBuf.reduce((s, v) => s + v, 0) / centerYBuf.length;
    }

    // ── Drawing ──────────────────────────────────────────────────
    function drawGestureOverlay(multiHandLandmarks) {
      const w = landmarkCanvas.width, h = landmarkCanvas.height;
      if (!multiHandLandmarks || multiHandLandmarks.length < 2) return;

      const p0 = multiHandLandmarks[0][0], p1 = multiHandLandmarks[1][0];
      const x0 = p0.x * w, y0 = p0.y * h;
      const x1 = p1.x * w, y1 = p1.y * h;

      lCtx.save();
      lCtx.globalAlpha = 0.35 + gesture.openPercent * 0.65;
      lCtx.strokeStyle = '#ffee00';
      lCtx.lineWidth   = 2;
      lCtx.setLineDash([8, 6]);
      lCtx.beginPath();
      lCtx.moveTo(x0, y0);
      lCtx.lineTo(x1, y1);
      lCtx.stroke();
      lCtx.setLineDash([]);

      lCtx.globalAlpha = 1;
      lCtx.beginPath();
      lCtx.arc(gesture.centerX, gesture.centerY, 6, 0, Math.PI * 2);
      lCtx.fillStyle = '#ffee00';
      lCtx.fill();
      lCtx.restore();
    }

    function drawLandmarks(multiHandLandmarks, multiHandedness) {
      const w = landmarkCanvas.width, h = landmarkCanvas.height;
      lCtx.clearRect(0, 0, w, h);
      if (!multiHandLandmarks) return;

      multiHandLandmarks.forEach((landmarks, i) => {
        const label = multiHandedness[i]?.label ?? '';
        const color = label === 'Left' ? '#00e5ff' : '#ff4081';

        lCtx.strokeStyle = color;
        lCtx.lineWidth   = 2;
        lCtx.globalAlpha = 0.75;
        HAND_CONNECTIONS.forEach(([a, b]) => {
          lCtx.beginPath();
          lCtx.moveTo(landmarks[a].x * w, landmarks[a].y * h);
          lCtx.lineTo(landmarks[b].x * w, landmarks[b].y * h);
          lCtx.stroke();
        });

        lCtx.globalAlpha = 1;
        landmarks.forEach((pt, idx) => {
          const isKey = [4, 8, 12, 16, 20, 0].includes(idx);
          lCtx.beginPath();
          lCtx.arc(pt.x * w, pt.y * h, isKey ? 6 : 3, 0, Math.PI * 2);
          lCtx.fillStyle = isKey ? '#fff' : color;
          lCtx.fill();
        });
      });

      drawGestureOverlay(multiHandLandmarks);
    }

    // ── Debug panel ──────────────────────────────────────────────
    function updateDebug(multiHandLandmarks, multiHandedness) {
      const count    = multiHandLandmarks?.length ?? 0;
      const detected = count > 0;
      debugEl.style.color = detected ? '#00ff88' : '#ff4444';

      const labels = detected
        ? multiHandedness.map(h => h.label === 'Left' ? '왼손' : '오른손').join(', ')
        : '-';

      const state = gesture.openPercent >= 0.99 ? '🟡 완전 열림'
                  : gesture.openPercent > 0.01  ? '🟠 열리는 중'
                  :                               '⚪ 닫힘';

      debugEl.textContent = [
        `손 감지: ${detected ? '✅' : '❌'} ${count}개`,
        `종류: ${labels}`,
        `openPercent: ${gesture.openPercent.toFixed(2)}${spaceOpen ? '  [SPACE]' : ''}`,
        `tiltAngle: ${gesture.openPercent > 0 ? gesture.tiltAngle.toFixed(1) + '°' : '-'}`,
        `상태: ${state}`,
      ].join('\n');
    }

    // ── MediaPipe Hands ──────────────────────────────────────────
    function initHands() {
      const hands = new Hands({
        locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });
      hands.setOptions({
        maxNumHands:            2,
        modelComplexity:        1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence:  0.6,
      });
      hands.onResults(results => {
        calcGesture(results.multiHandLandmarks);
        drawLandmarks(results.multiHandLandmarks, results.multiHandedness);
        updateDebug(results.multiHandLandmarks, results.multiHandedness);
        updateCaseOpen(
          gesture.openPercent,
          gesture.tiltAngle,
          gesture.bothHands ? gesture.centerX : null,
          gesture.bothHands ? gesture.centerY : null,
        );
      });

      new Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 1280, height: 720,
      }).start();
    }

    // ── Camera stream ────────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();
        resizeAll();

        const settings = stream.getVideoTracks()[0].getSettings();
        debugEl.style.color = '#aaa';
        debugEl.textContent = `카메라: ON  (${settings.width}×${settings.height})\n손 감지: 초기화 중...`;
        initHands();
      } catch (err) {
        errorMsg.style.display = 'block';
        errorMsg.textContent   = `카메라 오류: ${err.message}\n카메라 권한을 허용해주세요.`;
        debugEl.textContent    = '카메라: 오류';
        console.error(err);
      }
    }

    startCamera();
  </script>
</body>
</html>
