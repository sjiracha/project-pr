<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Propose Ring</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #camera-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror */
    }

    /* 2D landmark debug overlay */
    #landmark-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      transform: scaleX(-1); /* mirror to match video */
    }

    /* Three.js 3D overlay */
    #three-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #debug {
      position: absolute;
      top: 16px;
      left: 16px;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.8;
      text-shadow: 0 0 6px #000, 0 0 6px #000;
      z-index: 10;
      pointer-events: none;
      white-space: pre;
    }

    #error-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #f55;
      font-family: monospace;
      font-size: 18px;
      text-align: center;
      z-index: 20;
      display: none;
    }
  </style>
</head>
<body>

  <video id="camera-video" autoplay playsinline muted></video>
  <canvas id="landmark-canvas"></canvas>
  <canvas id="three-canvas"></canvas>
  <div id="debug">카메라 초기화 중...</div>
  <div id="error-msg"></div>

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- MediaPipe Hands CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script>
    const video          = document.getElementById('camera-video');
    const landmarkCanvas = document.getElementById('landmark-canvas');
    const threeCanvas    = document.getElementById('three-canvas');
    const debugEl        = document.getElementById('debug');
    const errorMsg       = document.getElementById('error-msg');
    const lCtx           = landmarkCanvas.getContext('2d');

    // ── MediaPipe hand connection pairs ────────────────────────
    const HAND_CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],       // thumb
      [0,5],[5,6],[6,7],[7,8],       // index
      [5,9],[9,10],[10,11],[11,12],  // middle
      [9,13],[13,14],[14,15],[15,16],// ring
      [13,17],[17,18],[18,19],[19,20],// pinky
      [0,17],                        // palm base
    ];

    // ── Three.js setup ──────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);

    const scene    = new THREE.Scene();
    const camera3d = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera3d.position.z = 5;

    function resizeAll() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      camera3d.aspect = w / h;
      camera3d.updateProjectionMatrix();
      landmarkCanvas.width  = w;
      landmarkCanvas.height = h;
    }
    window.addEventListener('resize', resizeAll);

    (function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera3d);
    })();

    // ── Gesture state ───────────────────────────────────────────
    const CLOSE_DIST  = 150; // px — fully closed threshold
    const OPEN_DIST   = 500; // px — fully open threshold
    const SMOOTH_LEN  = 5;   // moving-average window size
    const DECAY_RATE  = 0.08; // per-frame decay when hands are absent

    const smoothBuf = [];    // ring buffer for openPercent smoothing
    let gesture = {
      openPercent: 0,
      tiltAngle:   0,
      centerX:     0,
      centerY:     0,
    };

    function calcGesture(multiHandLandmarks) {
      const w = landmarkCanvas.width;
      const h = landmarkCanvas.height;

      if (!multiHandLandmarks || multiHandLandmarks.length < 2) {
        // gradually decay to 0
        const raw = gesture.openPercent - DECAY_RATE;
        gesture.openPercent = Math.max(0, raw);
        return;
      }

      const p0 = multiHandLandmarks[0][0]; // wrist / palm center
      const p1 = multiHandLandmarks[1][0];
      const x0 = p0.x * w, y0 = p0.y * h;
      const x1 = p1.x * w, y1 = p1.y * h;

      const dx   = x1 - x0;
      const dy   = y1 - y0;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // raw openPercent [0,1]
      const raw = Math.min(1, Math.max(0, (dist - CLOSE_DIST) / (OPEN_DIST - CLOSE_DIST)));

      // moving-average smoothing
      smoothBuf.push(raw);
      if (smoothBuf.length > SMOOTH_LEN) smoothBuf.shift();
      const smoothed = smoothBuf.reduce((s, v) => s + v, 0) / smoothBuf.length;

      gesture.openPercent = smoothed;
      gesture.tiltAngle   = Math.atan2(dy, dx) * (180 / Math.PI);
      gesture.centerX     = (x0 + x1) / 2;
      gesture.centerY     = (y0 + y1) / 2;
    }

    function drawGestureOverlay(multiHandLandmarks) {
      const w = landmarkCanvas.width;
      const h = landmarkCanvas.height;

      if (!multiHandLandmarks || multiHandLandmarks.length < 2) return;

      const p0 = multiHandLandmarks[0][0];
      const p1 = multiHandLandmarks[1][0];
      const x0 = p0.x * w, y0 = p0.y * h;
      const x1 = p1.x * w, y1 = p1.y * h;

      // line between palm centers
      const alpha = 0.4 + gesture.openPercent * 0.6;
      lCtx.save();
      lCtx.globalAlpha = alpha;
      lCtx.strokeStyle = '#ffee00';
      lCtx.lineWidth   = 2;
      lCtx.setLineDash([8, 6]);
      lCtx.beginPath();
      lCtx.moveTo(x0, y0);
      lCtx.lineTo(x1, y1);
      lCtx.stroke();
      lCtx.setLineDash([]);

      // center dot
      lCtx.globalAlpha = 1;
      lCtx.beginPath();
      lCtx.arc(gesture.centerX, gesture.centerY, 6, 0, Math.PI * 2);
      lCtx.fillStyle = '#ffee00';
      lCtx.fill();
      lCtx.restore();
    }

    // ── Landmark drawing ────────────────────────────────────────
    function drawLandmarks(multiHandLandmarks, multiHandedness) {
      const w = landmarkCanvas.width;
      const h = landmarkCanvas.height;
      lCtx.clearRect(0, 0, w, h);

      if (!multiHandLandmarks) return;

      multiHandLandmarks.forEach((landmarks, i) => {
        const label = multiHandedness[i]?.label ?? '';
        const color = label === 'Left' ? '#00e5ff' : '#ff4081';

        // connections
        lCtx.strokeStyle = color;
        lCtx.lineWidth   = 2;
        lCtx.globalAlpha = 0.75;
        HAND_CONNECTIONS.forEach(([a, b]) => {
          lCtx.beginPath();
          lCtx.moveTo(landmarks[a].x * w, landmarks[a].y * h);
          lCtx.lineTo(landmarks[b].x * w, landmarks[b].y * h);
          lCtx.stroke();
        });

        // dots
        lCtx.globalAlpha = 1;
        landmarks.forEach((pt, idx) => {
          const isKey = [4, 8, 12, 16, 20, 0].includes(idx);
          lCtx.beginPath();
          lCtx.arc(pt.x * w, pt.y * h, isKey ? 6 : 3, 0, Math.PI * 2);
          lCtx.fillStyle = isKey ? '#fff' : color;
          lCtx.fill();
        });
      });

      drawGestureOverlay(multiHandLandmarks);
    }

    // ── Debug text ──────────────────────────────────────────────
    function updateDebug(multiHandLandmarks, multiHandedness) {
      const count    = multiHandLandmarks?.length ?? 0;
      const detected = count > 0;
      debugEl.style.color = detected ? '#00ff88' : '#ff4444';

      const labels = detected
        ? multiHandedness.map(h => h.label === 'Left' ? '왼손' : '오른손').join(', ')
        : '-';

      const pct   = gesture.openPercent.toFixed(2);
      const tilt  = gesture.openPercent > 0 ? gesture.tiltAngle.toFixed(1) + '°' : '-';
      const state = gesture.openPercent >= 1   ? '🟡 완전 열림'
                  : gesture.openPercent > 0.01 ? `🟠 열리는 중`
                  :                              '⚪ 닫힘';

      debugEl.textContent = [
        `손 감지: ${detected ? '✅' : '❌'} ${count}개`,
        `종류: ${labels}`,
        `openPercent: ${pct}`,
        `tiltAngle: ${tilt}`,
        `상태: ${state}`,
      ].join('\n');
    }

    // ── MediaPipe Hands ─────────────────────────────────────────
    function initHands() {
      const hands = new Hands({
        locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });

      hands.setOptions({
        maxNumHands:          2,
        modelComplexity:      1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence:  0.6,
      });

      hands.onResults(results => {
        calcGesture(results.multiHandLandmarks);
        drawLandmarks(results.multiHandLandmarks, results.multiHandedness);
        updateDebug(results.multiHandLandmarks, results.multiHandedness);
      });

      const mpCamera = new Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 1280,
        height: 720,
      });
      mpCamera.start();
    }

    // ── Camera stream ───────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();

        resizeAll();

        const settings = stream.getVideoTracks()[0].getSettings();
        debugEl.style.color = '#aaa';
        debugEl.textContent = `카메라: ON  (${settings.width}×${settings.height})\n손 감지: 초기화 중...`;

        initHands();
      } catch (err) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = `카메라 오류: ${err.message}\n카메라 권한을 허용해주세요.`;
        debugEl.textContent = '카메라: 오류';
        console.error(err);
      }
    }

    startCamera();
  </script>
</body>
</html>
