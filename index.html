<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Propose Ring</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

    #camera-video {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1);
    }

    #landmark-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; transform: scaleX(-1);
    }

    #three-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #debug {
      position: absolute; top: 16px; left: 16px;
      font-family: monospace; font-size: 14px; line-height: 1.8;
      text-shadow: 0 0 6px #000, 0 0 6px #000;
      z-index: 10; pointer-events: none; white-space: pre;
    }

    #error-msg {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #f55; font-family: monospace; font-size: 18px;
      text-align: center; z-index: 20; display: none;
    }

    #hint {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4); font-family: monospace; font-size: 13px;
      z-index: 10; pointer-events: none; letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <video id="camera-video" autoplay playsinline muted></video>
  <canvas id="landmark-canvas"></canvas>
  <canvas id="three-canvas"></canvas>
  <div id="debug">카메라 초기화 중...</div>
  <div id="error-msg"></div>
  <div id="hint">[D] 디버그 랜드마크 토글</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script>
    // ── DOM refs ─────────────────────────────────────────────────
    const video          = document.getElementById('camera-video');
    const landmarkCanvas = document.getElementById('landmark-canvas');
    const threeCanvas    = document.getElementById('three-canvas');
    const debugEl        = document.getElementById('debug');
    const errorMsg       = document.getElementById('error-msg');
    const lCtx           = landmarkCanvas.getContext('2d');

    const HAND_CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [5,9],[9,10],[10,11],[11,12],
      [9,13],[13,14],[14,15],[15,16],
      [13,17],[17,18],[18,19],[19,20],
      [0,17],
    ];

    // ── Three.js core ────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true, logarithmicDepthBuffer: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    renderer.shadowMap.enabled = true;

    const scene    = new THREE.Scene();
    const camera3d = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera3d.position.set(0, 2, 8);
    camera3d.lookAt(0, 0, 0);

    function resizeAll() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      camera3d.aspect = w / h;
      camera3d.updateProjectionMatrix();
      landmarkCanvas.width  = w;
      landmarkCanvas.height = h;
    }
    window.addEventListener('resize', resizeAll);

    // ── Lighting ─────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.35));

    const dirFront = new THREE.DirectionalLight(0xfff0d0, 1.0);
    dirFront.position.set(2, 5, 4);
    scene.add(dirFront);

    const dirSide = new THREE.DirectionalLight(0xc8d8ff, 0.4);
    dirSide.position.set(-4, 2, 1);
    scene.add(dirSide);

    // PointLight above — ring sparkle when lid opens
    const pointTop = new THREE.PointLight(0xfff5e0, 2.0, 10);
    pointTop.position.set(0, 5, 1);
    scene.add(pointTop);

    // ── Rounded box geometry helper ──────────────────────────────
    // Creates a w×h×d box with arc-rounded edges and corners.
    // Uses ExtrudeGeometry: rounded-rect shape in XZ → extrude along Y.
    function roundedBoxGeo(w, h, d, r, segs) {
      segs = segs || 4;
      r = Math.min(r, w * 0.44, h * 0.44, d * 0.44);

      // Rounded rectangle shape in XZ plane (footprint of the box)
      const shape = new THREE.Shape();
      shape.moveTo(-w / 2 + r, -d / 2);
      shape.lineTo( w / 2 - r, -d / 2);
      shape.absarc( w / 2 - r, -d / 2 + r, r, -Math.PI / 2,        0, false);
      shape.lineTo( w / 2,      d / 2 - r);
      shape.absarc( w / 2 - r,  d / 2 - r, r,         0,  Math.PI / 2, false);
      shape.lineTo(-w / 2 + r,  d / 2);
      shape.absarc(-w / 2 + r,  d / 2 - r, r,  Math.PI / 2,     Math.PI, false);
      shape.lineTo(-w / 2,     -d / 2 + r);
      shape.absarc(-w / 2 + r, -d / 2 + r, r,     Math.PI, 3 * Math.PI / 2, false);

      const extrudeDepth = Math.max(0.001, h - 2 * r);
      const geo = new THREE.ExtrudeGeometry(shape, {
        steps:          1,
        depth:          extrudeDepth,
        bevelEnabled:   true,
        bevelThickness: r,
        bevelSize:      r,
        bevelOffset:    -r,
        bevelSegments:  segs,
        curveSegments:  segs * 3,
      });

      geo.center();
      // The shape lives in XY and extrudes along Z.
      // Rotate -90° around X so the flat footprint lies in XZ (Y becomes vertical).
      geo.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
      return geo;
    }

    // ── Gold edge outline helper ─────────────────────────────────
    // Adds crisp rectangular gold edge lines that frame the rounded body.
    function addGoldEdges(mesh, w, h, d, mat) {
      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, d)),
        mat
      );
      mesh.add(edges);
    }

    // ── Materials ────────────────────────────────────────────────
    // Deep velvet navy — high roughness, zero metalness for matte fabric feel
    const caseMat  = new THREE.MeshStandardMaterial({ color: 0x0B1622, roughness: 0.88, metalness: 0.0 });
    const goldLine = new THREE.LineBasicMaterial({ color: 0xD4AF37 });
    const creamMat = new THREE.MeshStandardMaterial({ color: 0xF0E8DC, roughness: 0.94 });
    const slotMat  = new THREE.MeshStandardMaterial({ color: 0xE0D5C5, roughness: 0.97 });
    const ringMat  = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.92, roughness: 0.12 });

    // Diamond material — B-mode (metalness-driven sparkle, no envmap required)
    const diaMat = new THREE.MeshPhysicalMaterial({
      color:              0xFFFFFF,
      metalness:          0.5,
      roughness:          0.0,
      clearcoat:          1.0,
      clearcoatRoughness: 0.0,
      reflectivity:       1.0,
      emissive:           0xFFFFFF,
      emissiveIntensity:  0.05,
      flatShading:        true,
    });

    // ── Dimensions (50% of original) ─────────────────────────────
    const BW = 1.5, BH = 0.75, BD = 1.5; // base width / height / depth
    const LH = 0.15;                       // lid height
    const BR = 0.08;                       // base bevel radius
    const LR = 0.04;                       // lid bevel radius
    const MAX_OPEN = -(110 * Math.PI / 180);

    // ── Case group ───────────────────────────────────────────────
    const caseGroup = new THREE.Group();
    caseGroup.rotation.x = 0;
    caseGroup.position.y = -0.4;
    caseGroup.video = false; //shown only when both hands are detected
    scene.add(caseGroup);

    // ─ Base ─
    const baseMesh = new THREE.Mesh(roundedBoxGeo(BW, BH, BD, BR, 5), caseMat);
    caseGroup.add(baseMesh);
    addGoldEdges(baseMesh, BW, BH, BD, goldLine);

    // ─ Interior walls (PlaneGeometry) ─────────────────────────────────────
    // Each plane is strictly inside the rounded exterior — never coplanar with
    // any outer face, so z-fighting is impossible by construction.
    const INSET  = 0.12;
    const iW     = BW - INSET * 2;  // 1.26 inner width  (X)
    const iD     = BD - INSET * 2;  // 1.26 inner depth  (Z)
    const iH     = BH - INSET * 2;  // 0.51 inner height (Y)
    const innerMat = new THREE.MeshStandardMaterial({
      color:     0xF5F0E8,
      roughness: 0.90,
      side:      THREE.FrontSide,
    });

    // Floor — faces +Y, at bottom of interior cavity
    const iFloor = new THREE.Mesh(new THREE.PlaneGeometry(iW, iD), innerMat);
    iFloor.rotation.x = -Math.PI / 2;
    iFloor.position.y = -BH / 2 + INSET;  // -0.255, 0.12 above exterior bottom face
    baseMesh.add(iFloor);

    // Front wall — at +Z face, normal faces -Z toward interior
    const iFront = new THREE.Mesh(new THREE.PlaneGeometry(iW, iH), innerMat);
    iFront.rotation.y = Math.PI;
    iFront.position.set(0, 0,  BD / 2 - INSET);  // z = +0.63
    baseMesh.add(iFront);

    // Back wall — at -Z face, normal faces +Z toward interior
    const iBack = new THREE.Mesh(new THREE.PlaneGeometry(iW, iH), innerMat);
    // default normal = +Z ✓
    iBack.position.set(0, 0, -BD / 2 + INSET);  // z = -0.63
    baseMesh.add(iBack);

    // Left wall — at -X face, normal faces +X toward interior
    const iLeft = new THREE.Mesh(new THREE.PlaneGeometry(iD, iH), innerMat);
    iLeft.rotation.y = Math.PI / 2;
    iLeft.position.set(-BW / 2 + INSET, 0, 0);  // x = -0.63
    baseMesh.add(iLeft);

    // Right wall — at +X face, normal faces -X toward interior
    const iRight = new THREE.Mesh(new THREE.PlaneGeometry(iD, iH), innerMat);
    iRight.rotation.y = -Math.PI / 2;
    iRight.position.set( BW / 2 - INSET, 0, 0);  // x = +0.63
    baseMesh.add(iRight);

    // Ring cushion pad — horizontal surface near the top where the ring sits
    const ringPad = new THREE.Mesh(new THREE.PlaneGeometry(iW, iD), innerMat);
    ringPad.rotation.x = -Math.PI / 2;
    ringPad.position.y = BH / 2 - 0.10;  // 0.275, clearly below top rim (0.375)
    baseMesh.add(ringPad);

    // ─ Lid pivot group — hinge at back-top edge of base ─
    const lidPivot = new THREE.Group();
    lidPivot.position.set(0, BH / 2, -BD / 2);
    caseGroup.add(lidPivot);

    const lidMesh = new THREE.Mesh(roundedBoxGeo(BW, LH, BD, LR, 4), caseMat);
    lidMesh.position.set(0, LH / 2, BD / 2);
    lidPivot.add(lidMesh);
    addGoldEdges(lidMesh, BW, LH, BD, goldLine);

    // Cream lining on the inside face of the lid
    const lidIntMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(BW - 0.16, BD - 0.16),
      creamMat
    );
    lidIntMesh.rotation.x = Math.PI / 2;
    lidIntMesh.position.y = -LH / 2 + 0.03;
    lidMesh.add(lidIntMesh);

    // ─ Ring assembly ─────────────────────────────────────────────
    // ringGroup holds: band (torus) + main diamond (octahedron) + 4 accent stones (spheres).
    // The whole group stands upright facing the camera (O shape) inside the case.
    const ringGroup = new THREE.Group();
    ringGroup.visible = false;
    caseGroup.add(ringGroup);

    // Band — yellow gold torus
    const BAND_RADIUS = 0.18;
    const BAND_TUBE   = 0.038;
    const band = new THREE.Mesh(
      new THREE.TorusGeometry(BAND_RADIUS, BAND_TUBE, 16, 64),
      ringMat
    );
    ringGroup.add(band);

    // Main diamond — octahedron stretched vertically into a brilliant-cut profile
    const diaGeo = new THREE.OctahedronGeometry(0.06, 0);
    diaGeo.scale(1, 1.4, 1);
    const diamond = new THREE.Mesh(diaGeo, diaMat);
    // Sits on top of the band
    diamond.position.set(0, BAND_RADIUS + 0.05, 0);
    ringGroup.add(diamond);

    // Accent stones — 4 small spheres flanking the main diamond along the band's top arc
    const accentGeo = new THREE.SphereGeometry(0.018, 12, 10);
    const ACCENT_ANGLES = [-0.45, -0.18, 0.18, 0.45]; // radians from top of band
    ACCENT_ANGLES.forEach(angle => {
      const stone = new THREE.Mesh(accentGeo, diaMat);
      stone.position.set(
        Math.sin(angle) * BAND_RADIUS,
        Math.cos(angle) * BAND_RADIUS,
        0
      );
      ringGroup.add(stone);
    });

    // Y positions for ringGroup in caseGroup space
    const RING_Y_HIDDEN = 0.28;  // at ring-pad level (BH/2 - 0.10 = 0.275), sits in the slot
    const RING_Y_SHOWN  = 0.80;  // above the open case

    // ── Animation state ──────────────────────────────────────────
    // xRot: hand-driven X rotation; camera is now elevated so no base tilt needed
    const BASE_XTILT = 0;
    const Z_TILT_GAIN = 0.4; // softer than 1:1 - case rolls 0.4x the hand-line tilt
    const caseAnim = { lidTarget: 0, xRot: BASE_XTILT, zRot: 0, px: 0, py: -0.4 };

    function screenToWorld(px, py) {
      const w = window.innerWidth, h = window.innerHeight;
      const ndcX = ((w - px) / w) * 2 - 1; // flip X to match mirror
      const ndcY = -((py / h) * 2 - 1);
      const halfH = Math.tan((60 * Math.PI / 180) / 2) * 8; // camera z-component = 8
      const halfW = halfH * (w / h);
      const MARGIN = 1.2; // world units from edge — case never exits screen
      return {
        x: Math.max(-(halfW - MARGIN), Math.min(halfW - MARGIN, ndcX * halfW)),
        y: Math.max(-(halfH - MARGIN), Math.min(halfH - MARGIN, ndcY * halfH)),
      };
    }

    function updateCaseOpen(openPercent, _tiltAngle, cx, cy) {
      caseAnim.lidTarget = openPercent * MAX_OPEN;

      if (cx != null) {
        // Position
        const wp    = screenToWorld(cx, cy);
        caseAnim.px = wp.x;
        caseAnim.py = wp.y;

        // X rotation from hand center Y:
        //   cy = 0 (top of screen)    → +25° (camera looks down at case)
        //   cy = height (bottom)      → -25° (camera looks up)
        //   cy = height/2 (middle)    →   0° + BASE_XTILT
        const normY    = cy / landmarkCanvas.height; // 0 = top, 1 = bottom
        const xDeg     = (0.5 - normY) * 30;        // ±15°
        const xClamped = Math.max(-25, Math.min(25, xDeg)) * (Math.PI / 180);
        caseAnim.xRot  = BASE_XTILT + xClamped;

        // Z rotation from hand-line tilt - softened by Z_TILT_GAIN
        caseAnim.zRot = tiltAngle * (Math.PI / 180) * Z_TILT_GAIN;
      }
    }

    // ── Debug landmark visibility toggle ('d' key) ───────────────
    let debugVisible = true;
    document.addEventListener('keydown', e => {
      if (e.key !== 'd' && e.key !== 'D') return;
      debugVisible = !debugVisible;
      landmarkCanvas.style.display = debugVisible ? 'block' : 'none';
      debugEl.style.display = debugVisible ? 'block' : 'none';
    });

    // ── Gesture state ────────────────────────────────────────────
    const CLOSE_DIST   = 150, OPEN_DIST = 500, SMOOTH_LEN = 5, DECAY_RATE = 0.08;
    const OPEN_RATE    = 0.05;  // max openPercent change per frame
    const JUMP_THRESH  = 0.05;  // normalized wrist jump (5% of screen) that triggers frame rejection
    const TILT_RATE    = 1.0;   // max tiltAngle change in degrees per frame
    const CENTER_LEN   = 10;    // frames for center-position moving average
    const smoothBuf    = [];
    const centerXBuf   = [];
    const centerYBuf   = [];
    let prevWrists     = null;  // [{x,y}, {x,y}] in normalized coords from last valid frame
    let gesture = { openPercent: 0, tiltAngle: 0, centerX: 0, centerY: 0, bothHands: false };

    function wristDist(a, b) {
      const dx = a.x - b.x, dy = a.y - b.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function calcGesture(multiHandLandmarks) {
      const w = landmarkCanvas.width, h = landmarkCanvas.height;

      if (!multiHandLandmarks || multiHandLandmarks.length < 2) {
        gesture.bothHands   = false;
        gesture.openPercent = Math.max(0, gesture.openPercent - DECAY_RATE);
        prevWrists = null;
        centerXBuf.length   = 0;
        centerYBuf.length   = 0;
        return;
      }

      // Stability check: reject frame if wrists jumped too far from last frame.
      // Try both pairings (hands can swap index between frames).
      const p0 = multiHandLandmarks[0][0], p1 = multiHandLandmarks[1][0];
      const curr = [{ x: p0.x, y: p0.y }, { x: p1.x, y: p1.y }];
      if (prevWrists) {
        const jumpA = Math.max(wristDist(curr[0], prevWrists[0]), wristDist(curr[1], prevWrists[1]));
        const jumpB = Math.max(wristDist(curr[0], prevWrists[1]), wristDist(curr[1], prevWrists[0]));
        if (Math.min(jumpA, jumpB) > JUMP_THRESH) {
          prevWrists = null; // reset anchor — next valid frame becomes the new baseline
          return;
        }
      }
      prevWrists = curr;

      gesture.bothHands = true;
      const x0 = p0.x * w, y0 = p0.y * h;
      const x1 = p1.x * w, y1 = p1.y * h;
      const dx = x1 - x0, dy = y1 - y0;
      const dist = Math.sqrt(dx * dx + dy * dy);

      const raw = Math.min(1, Math.max(0, (dist - CLOSE_DIST) / (OPEN_DIST - CLOSE_DIST)));
      smoothBuf.push(raw);
      if (smoothBuf.length > SMOOTH_LEN) smoothBuf.shift();
      const smoothed = smoothBuf.reduce((s, v) => s + v, 0) / smoothBuf.length;

      // Rate-limit: openPercent changes at most OPEN_RATE per frame
      const delta = Math.max(-OPEN_RATE, Math.min(OPEN_RATE, smoothed - gesture.openPercent));
      gesture.openPercent += delta;

      // tiltAngle: rate-limited to TILT_RATE °/frame
      const rawTilt  = Math.atan2(dy, dx) * (180 / Math.PI);
      const tiltDelta = Math.max(-TILT_RATE, Math.min(TILT_RATE, rawTilt - gesture.tiltAngle));
      gesture.tiltAngle += tiltDelta;

      // centerX/Y: 10-frame moving average for smooth position tracking
      const rawCX = (x0 + x1) / 2, rawCY = (y0 + y1) / 2;
      centerXBuf.push(rawCX); if (centerXBuf.length > CENTER_LEN) centerXBuf.shift();
      centerYBuf.push(rawCY); if (centerYBuf.length > CENTER_LEN) centerYBuf.shift();
      gesture.centerX = centerXBuf.reduce((s, v) => s + v, 0) / centerXBuf.length;
      gesture.centerY = centerYBuf.reduce((s, v) => s + v, 0) / centerYBuf.length;
    }

    // ── Animate loop ─────────────────────────────────────────────
    (function animate() {
      requestAnimationFrame(animate);

      // Visibility: case appears only when both hands are tracked
      caseGroup.visible = gesture.bothHands;

      lidPivot.rotation.x  += (caseAnim.lidTarget - lidPivot.rotation.x)  * 0.10;
      caseGroup.rotation.x += (caseAnim.xRot      - caseGroup.rotation.x) * 0.08;
      caseGroup.rotation.z += (caseAnim.zRot      - caseGroup.rotation.z) * 0.04;
      caseGroup.position.x += (caseAnim.px        - caseGroup.position.x) * 0.03;
      caseGroup.position.y += (caseAnim.py        - caseGroup.position.y) * 0.03;

      // Ring lifecycle driven by current lid-open ratio
      const currentOpen = Math.abs(lidPivot.rotation.x) / Math.abs(MAX_OPEN);

      if (currentOpen < 0.3) {
        // Hidden — fully tucked inside the closed case
        ringGroup.visible = false;
      } else {
        ringGroup.visible = true;

        // 0.3 → 0.6: scale 0 → 1 with smoothstep easing, also rises out of the case
        const rawT  = Math.min(1, (currentOpen - 0.3) / 0.3);
        const eased = rawT * rawT * (3 - 2 * rawT);
        ringGroup.scale.setScalar(eased);
        ringGroup.position.y = RING_Y_HIDDEN + eased * (RING_Y_SHOWN - RING_Y_HIDDEN);

        // 0.6+: slow Y-axis spin to catch the light
        if (currentOpen > 0.6) {
          ringGroup.rotation.y += 0.01;
        }
      }

      renderer.render(scene, camera3d);
    })();

    // ── Drawing ──────────────────────────────────────────────────
    function drawGestureOverlay(multiHandLandmarks) {
      const w = landmarkCanvas.width, h = landmarkCanvas.height;
      if (!multiHandLandmarks || multiHandLandmarks.length < 2) return;

      const p0 = multiHandLandmarks[0][0], p1 = multiHandLandmarks[1][0];
      const x0 = p0.x * w, y0 = p0.y * h;
      const x1 = p1.x * w, y1 = p1.y * h;

      lCtx.save();
      lCtx.globalAlpha = 0.35 + gesture.openPercent * 0.65;
      lCtx.strokeStyle = '#ffee00';
      lCtx.lineWidth   = 2;
      lCtx.setLineDash([8, 6]);
      lCtx.beginPath();
      lCtx.moveTo(x0, y0);
      lCtx.lineTo(x1, y1);
      lCtx.stroke();
      lCtx.setLineDash([]);

      lCtx.globalAlpha = 1;
      lCtx.beginPath();
      lCtx.arc(gesture.centerX, gesture.centerY, 6, 0, Math.PI * 2);
      lCtx.fillStyle = '#ffee00';
      lCtx.fill();
      lCtx.restore();
    }

    function drawLandmarks(multiHandLandmarks, multiHandedness) {
      const w = landmarkCanvas.width, h = landmarkCanvas.height;
      lCtx.clearRect(0, 0, w, h);
      if (!multiHandLandmarks) return;

      multiHandLandmarks.forEach((landmarks, i) => {
        const label = multiHandedness[i]?.label ?? '';
        const color = label === 'Left' ? '#00e5ff' : '#ff4081';

        lCtx.strokeStyle = color;
        lCtx.lineWidth   = 2;
        lCtx.globalAlpha = 0.75;
        HAND_CONNECTIONS.forEach(([a, b]) => {
          lCtx.beginPath();
          lCtx.moveTo(landmarks[a].x * w, landmarks[a].y * h);
          lCtx.lineTo(landmarks[b].x * w, landmarks[b].y * h);
          lCtx.stroke();
        });

        lCtx.globalAlpha = 1;
        landmarks.forEach((pt, idx) => {
          const isKey = [4, 8, 12, 16, 20, 0].includes(idx);
          lCtx.beginPath();
          lCtx.arc(pt.x * w, pt.y * h, isKey ? 6 : 3, 0, Math.PI * 2);
          lCtx.fillStyle = isKey ? '#fff' : color;
          lCtx.fill();
        });
      });

      drawGestureOverlay(multiHandLandmarks);
    }

    // ── Debug panel ──────────────────────────────────────────────
    function updateDebug(multiHandLandmarks, multiHandedness) {
      const count    = multiHandLandmarks?.length ?? 0;
      const detected = count > 0;
      debugEl.style.color = detected ? '#00ff88' : '#ff4444';

      const labels = detected
        ? multiHandedness.map(h => h.label === 'Left' ? '왼손' : '오른손').join(', ')
        : '-';

      const state = gesture.openPercent >= 0.99 ? '🟡 완전 열림'
                  : gesture.openPercent > 0.01  ? '🟠 열리는 중'
                  :                               '⚪ 닫힘';

      debugEl.textContent = [
        `손 감지: ${detected ? '✅' : '❌'} ${count}개`,
        `종류: ${labels}`,
        `openPercent: ${gesture.openPercent.toFixed(2)}`,
        `tiltAngle: ${gesture.openPercent > 0 ? gesture.tiltAngle.toFixed(1) + '°' : '-'}`,
        `상태: ${state}`,
      ].join('\n');
    }

    // ── MediaPipe Hands ──────────────────────────────────────────
    function initHands() {
      const hands = new Hands({
        locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });
      hands.setOptions({
        maxNumHands:            2,
        modelComplexity:        1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence:  0.6,
      });
      hands.onResults(results => {
        calcGesture(results.multiHandLandmarks);
        drawLandmarks(results.multiHandLandmarks, results.multiHandedness);
        updateDebug(results.multiHandLandmarks, results.multiHandedness);
        updateCaseOpen(
          gesture.openPercent,
          gesture.tiltAngle,
          gesture.bothHands ? gesture.centerX : null,
          gesture.bothHands ? gesture.centerY : null,
        );
      });

      new Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 1280, height: 720,
      }).start();
    }

    // ── Camera stream ────────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();
        resizeAll();

        const settings = stream.getVideoTracks()[0].getSettings();
        debugEl.style.color = '#aaa';
        debugEl.textContent = `카메라: ON  (${settings.width}×${settings.height})\n손 감지: 초기화 중...`;
        initHands();
      } catch (err) {
        errorMsg.style.display = 'block';
        errorMsg.textContent   = `카메라 오류: ${err.message}\n카메라 권한을 허용해주세요.`;
        debugEl.textContent    = '카메라: 오류';
        console.error(err);
      }
    }

    startCamera();
  </script>
</body>
</html>
